{% extends 'base.html' %}

{% block title %}删除评论{% endblock %}

{% block content %}
<div class="card confirm-box">
    <div class="icon">🗑️</div>
    <h2>确认删除评论？</h2>
    <p style="color:var(--text-light);margin:12px 0 6px;">评论内容：</p>
    <p style="background:var(--bg);padding:12px;border-radius:5px;margin-bottom:18px;">{{ comment.content }}</p>
    <p style="color:var(--text-light);font-size:14px;margin-bottom:24px;">
        评论者：{{ comment.author.username }} · {{ comment.created_at|date:'Y-m-d H:i' }}
    </p>
    <form method="post" style="display:flex;gap:10px;justify-content:center;">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">确认删除</button>
        <a href="{% url 'blog:article_detail' comment.article_id %}#comments" class="btn btn-secondary">取消</a>
    </form>
</div>
{% endblock %}
