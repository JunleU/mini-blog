{% extends 'base.html' %}

{% block title %}删除文章{% endblock %}

{% block content %}
<div class="card confirm-box">
    <div class="icon">🗑️</div>
    <h2>确认删除文章？</h2>
    <p style="color:var(--text-light);margin:12px 0 6px;">
        您即将删除文章：
    </p>
    <p style="font-weight:600;margin-bottom:18px;">《{{ object.title }}》</p>
    <p style="color:var(--cinnabar);font-size:14px;margin-bottom:24px;">
        此操作不可撤销，文章下的所有评论也将一并被删除。
    </p>
    <form method="post" style="display:flex;gap:10px;justify-content:center;">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">确认删除</button>
        <a href="{% url 'blog:article_detail' object.pk %}" class="btn btn-secondary">取消</a>
    </form>
</div>
{% endblock %}
